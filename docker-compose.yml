version: '3.8'

services:
  quarto-preview:
    build: .
    container_name: quarto-projet-preview
    # Exécuter avec l'UID/GID de l'hôte pour éviter de créer des fichiers appartenant à root
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "4815:4815"
    volumes:
      # Monte le dossier actuel dans le conteneur pour le Live-Reload
      - .:/app
      # Évite d'écraser le venv système du conteneur si un dossier venv/ existe localement
      - /app/venv/
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - HOME=/tmp # Empêche Quarto d'écrire son cache dans le dossier /root
    # Démarre la prévisualisation quarto avec rechargement automatique en direct
    command: quarto preview report/rapport.qmd --host 0.0.0.0 --port 4815 --no-browser

  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: aptispace-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard/frontend:/app
      - /app/node_modules
      - ./models:/app/models
    environment:
      - NODE_ENV=development

  backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: aptispace-backend
    ports:
      - "8000:8000"
    volumes:
      - ./dashboard/backend:/app
      - ./models:/app/models
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
